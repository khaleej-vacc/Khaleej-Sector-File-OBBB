# yaml-language-server: $schema=./airport.schema.yaml

location:
  latitude: 26.270778611111
  longitude: 50.633758333333

sequencingHorizon: PT60M
lockedHorizon: PT10M

feederFixes: [ "ORDIG", "KOBOK", "LADNA", "TULUB", "NAGAT", "MARWA" ]
feederFixTimelineArrivalLabelLayoutId: "bahArr"

runwayThresholds:
  30R:
    location:
      latitude: 26.262671944444
      longitude: 50.647786111111
    elevation: 8
    trueHeading: 300
  12L:
    location:
      latitude: 26.278983055556
      longitude: 50.619521944444
    elevation: 8
    trueHeading: 120

# Speed and altitude values should be based on typical observed values
arrivalProfiles:
  30R:
    - arrivalName: "*" # Applies to all arrival routes for 30R
      frozenSequenceArea: commonFrozenArea
      sequencingArea: commonSequencingArea
      fixes:
        # Standard approaches
        - { fix: CI30R, speed: 180, altitude: 1500, role: IF }
        # RNP 30R
        - { fix: BI602, speed: 180, altitude: 1400, role: IF }
    - arrivalName: "ORDIG*"
      fixes:
        - { fix: ORDIG, speed: 250, altitude: 12000 }
        - { fix: LOVAK, speed: 230, altitude: 8000 }
        - { fix: OBSAS, speed: 230, altitude: 6000 }
        - { fix: RIGAG, speed: 230, altitude: 5500 }
        - { fix: NAGAT, speed: 210, altitude: 3500 }
    - arrivalName: "KOBOK*"
      fixes:
        - { fix: KOBOK, speed: 250, altitude: 12000 }
        - { fix: ELELO, speed: 230, altitude: 7000 }
        - { fix: OBSAS, speed: 230, altitude: 5000 }
        - { fix: RIGAG, speed: 230, altitude: 5000 }
        - { fix: ALRAS, speed: 210, altitude: 3500 }
    - arrivalName: "LADNA*"
      fixes:
        - { fix: LADNA, speed: 250, altitude: 9000 }
        - { fix: ELELO, speed: 230, altitude: 8000 }
        - { fix: OBSAS, speed: 230, altitude: 6000 }
        - { fix: RIGAG, speed: 230, altitude: 5500 }
        - { fix: NAGAT, speed: 210, altitude: 3000 }
    - arrivalName: "TULUB"
      fixes:
        - { fix: TULUB, speed: 210, altitude: 12000 }
  12L:
    - arrivalName: "*" # Applies to all arrival routes for 12L
      frozenSequenceArea: commonFrozenArea
      sequencingArea: commonSequencingArea
      fixes:
        # Standard approaches
        - { fix: CI12L, speed: 180, altitude: 1500, role: IF }
        # RNP 12L
        - { fix: BI502, speed: 180, altitude: 1400, role: IF }
    - arrivalName: "ORDIG*"
      fixes:
        - { fix: ORDIG, speed: 250, altitude: 12000 }
        - { fix: LOVAK, speed: 230, altitude: 11000 }
        - { fix: OBSAS, speed: 230, altitude: 5000 }
        - { fix: RIGAG, speed: 230, altitude: 5000 }
        - { fix: ALRAS, speed: 210, altitude: 3500 }
    - arrivalName: "KOBOK*"
      fixes:
        - { fix: KOBOK, speed: 250, altitude: 12000 }
        - { fix: ELELO, speed: 230, altitude: 7000 }
        - { fix: OBSAS, speed: 230, altitude: 5000 }
        - { fix: RIGAG, speed: 230, altitude: 5000 }
        - { fix: ALRAS, speed: 210, altitude: 3500 }
    - arrivalName: "LADNA*"
      fixes:
        - { fix: LADNA, speed: 250, altitude: 9000 }
        - { fix: ELELO, speed: 230, altitude: 7000 }
        - { fix: OBSAS, speed: 230, altitude: 5000 }
        - { fix: RIGAG, speed: 230, altitude: 5000 }
        - { fix: ALRAS, speed: 210, altitude: 3000 }
    - arrivalName: "TULUB"
      fixes:
        - { fix: TULUB, speed: 230, altitude: 12000 }
        - { fix: RIGAG, speed: 230, altitude: 5000 }
        - { fix: ALRAS, speed: 210, altitude: 3000 }

